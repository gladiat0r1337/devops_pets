<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CI/CD Deploy</title>
    <style>
        body {
            background-color: #1e1e1e;
            color: #00ff00; /* Хакерский зеленый */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #000000;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #333;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.7);
            max-width: 600px;
            text-align: center;
        }
        h1 {
            color: #ffffff;
            margin-bottom: 10px;
        }
        .blinking-cursor {
            font-weight: bold;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>GitHub Actions Pipeline Check</h1>
    </div>
</body>
