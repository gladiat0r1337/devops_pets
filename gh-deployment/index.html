<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Console</title>
    <style>
        body {
            background-color: #0c0c0c; 
            color: #ffffff;            
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 15px;            
            height: 100vh;
            box-sizing: border-box;
            line-height: 1.6;         
        }
        

        .success {
            color: #00ff00; 
        }

        /* Стиль для мигающего курсора */
        .cursor {
            font-weight: bold;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="success">Deployed succsessfuly</div>
    
    <div>root@server:~# <span class="cursor">_</span></div>

</body>
</html>
